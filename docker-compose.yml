      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_furniture
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
