name: bookstore

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookstore_admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - bookstore-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bookstore_admin -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    hostname: neo4j
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_server_default__advertised__address=neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - bookstore-network
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p neo4jpassword 'RETURN 1;' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
  api-gateway:
    build: ./api_gateway
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      - SECRET_KEY=bookstore-gateway-secret-key-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_gateway
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      # Service URLs (internal Docker network)
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      - COMMENT_SERVICE_URL=http://comment-service:8000
      - CATALOG_SERVICE_URL=http://catalog-service:8000
      - STAFF_SERVICE_URL=http://staff-service:8000
      - MANAGER_SERVICE_URL=http://manager-service:8000
      - ELECTRONICS_SERVICE_URL=http://electronics-service:8000
      - FASHION_SERVICE_URL=http://fashion-service:8000
      - TOY_SERVICE_URL=http://toy-service-v2:8000
      - GROCERY_SERVICE_URL=http://grocery-service:8000
      - FURNITURE_SERVICE_URL=http://furniture-service:8000
      - BEAUTY_SERVICE_URL=http://beauty-service:8000
      - SPORTS_SERVICE_URL=http://sports-service:8000
      - PET_SERVICE_URL=http://pet-service:8000
      - STATIONERY_SERVICE_URL=http://stationery-service:8000
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:15173
      - AUTH_SERVICE_URL=http://auth-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      customer-service:
        condition: service_started
      auth-service:
        condition: service_started
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      comment-service:
        condition: service_started
      catalog-service:
        condition: service_started
      staff-service:
        condition: service_started
      manager-service:
        condition: service_started
      electronics-service:
        condition: service_started
      fashion-service:
        condition: service_started
      toy-service-v2:
        condition: service_started
      grocery-service:
        condition: service_started
      furniture-service:
        condition: service_started
      beauty-service:
        condition: service_started
      sports-service:
        condition: service_started
      pet-service:
        condition: service_started
      stationery-service:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - bookstore-network

  # ============================================================
  # AI Service (Knowledge Graph + Behavior Model + RAG Chat)
  # Port: 18009 | DB: bookstore_micro_recommender
  # ============================================================
  ai-service:
    build: ./AI-serivce
    restart: unless-stopped
    ports:
      - "18009:8000"
    environment:
      - SECRET_KEY=bookstore-ai-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_recommender
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - GRAPH_BACKEND=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookstore-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bookstore-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-worker:
    build: ./AI-serivce
    restart: unless-stopped
    command: celery -A recommender_service worker -l info
    environment:
      - SECRET_KEY=bookstore-ai-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_recommender
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - GRAPH_BACKEND=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - RUN_MIGRATIONS=false
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookstore-network

  ai-beat:
    build: ./AI-serivce
    restart: unless-stopped
    command: celery -A recommender_service beat -l info
    environment:
      - SECRET_KEY=bookstore-ai-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_recommender
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - GRAPH_BACKEND=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - RUN_MIGRATIONS=false
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookstore-network

  frontend:
    build: ./Frontend
    restart: unless-stopped
    ports:
      - "15173:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - bookstore-network

  # ============================================================
  # Auth Service (Centralized Authentication + JWT)
  # Port: 18021 | DB: bookstore_micro_customer (shared identity store)
  # ============================================================
  auth-service:
    build: ./auth-service
    restart: unless-stopped
    ports:
      - "18021:8000"
    environment:
      - SECRET_KEY=bookstore-auth-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_customer
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - CART_SERVICE_URL=http://cart-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started
    networks:
      - bookstore-network

  # ============================================================
  # Customer Service (Profile + Customer Data)
  # Port: 18001 | DB: bookstore_micro_customer
  # ============================================================
  customer-service:
    build: ./customer-service
    restart: unless-stopped
    ports:
      - "18001:8000"
    environment:
      - SECRET_KEY=bookstore-customer-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_customer
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - CART_SERVICE_URL=http://cart-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Book Service (Book Catalog CRUD)
  # Port: 18002 | DB: bookstore_micro_book
  # ============================================================
  book-service:
    build: ./book-service
    restart: unless-stopped
    ports:
      - "18002:8000"
    environment:
      - SECRET_KEY=bookstore-book-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_book
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Cart Service (Shopping Cart)
  # Port: 18003 | DB: bookstore_micro_cart
  # ============================================================
  cart-service:
    build: ./cart-service
    restart: unless-stopped
