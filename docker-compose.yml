  pet-service:
    build: ./pet-service
    restart: unless-stopped
    ports:
      - "18019:8000"
    environment:
      - SECRET_KEY=bookstore-pet-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_pet
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  stationery-service:
    build: ./stationery-service
    restart: unless-stopped
    ports:
      - "18020:8000"
    environment:
      - SECRET_KEY=bookstore-stationery-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_stationery
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
