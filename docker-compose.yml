name: bookstore

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookstore_admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore_admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_server_default__advertised__address: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p neo4jpassword 'RETURN 1;' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./AI-serivce
    restart: unless-stopped
    ports:
      - "18009:8000"
    environment:
      SECRET_KEY: bookstore-ai-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_recommender
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  ai-worker:
    build: ./AI-serivce
    restart: unless-stopped
    command: celery -A recommender_service worker -l info
    environment:
      SECRET_KEY: bookstore-ai-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_recommender
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookstore-network

  ai-beat:
    build: ./AI-serivce
    restart: unless-stopped
    command: celery -A recommender_service beat -l info
    environment:
      SECRET_KEY: bookstore-ai-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_recommender
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookstore-network

  cart-service:
    build: ./cart-service
    restart: unless-stopped
    ports:
      - "18003:8000"
    environment:
      SECRET_KEY: bookstore-cart-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_cart
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      BOOK_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/security/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  pay-service:
    build: ./pay-service
    restart: unless-stopped
    ports:
      - "18005:8000"
    environment:
      SECRET_KEY: bookstore-pay-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_payment
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/security/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  ship-service:
    build: ./ship-service
    restart: unless-stopped
    ports:
      - "18006:8000"
    environment:
      SECRET_KEY: bookstore-ship-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_shipping
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/security/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  order-service:
    build: ./order-service
    restart: unless-stopped
    ports:
      - "18004:8000"
    environment:
      SECRET_KEY: bookstore-order-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_order
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      CART_SERVICE_URL: http://cart-service:8000
      BOOK_SERVICE_URL: http://product-service:8000
      PAY_SERVICE_URL: http://pay-service:8000
      SHIP_SERVICE_URL: http://ship-service:8000
      ELECTRONICS_SERVICE_URL: http://product-service:8000
      FASHION_SERVICE_URL: http://product-service:8000
      TOY_SERVICE_URL: http://product-service:8000
      GROCERY_SERVICE_URL: http://product-service:8000
      FURNITURE_SERVICE_URL: http://product-service:8000
      BEAUTY_SERVICE_URL: http://product-service:8000
      SPORTS_SERVICE_URL: http://product-service:8000
      PET_SERVICE_URL: http://product-service:8000
      STATIONERY_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      pay-service:
        condition: service_healthy
      ship-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/security/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  api-gateway:
    build: ./api_gateway
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      SECRET_KEY: bookstore-gateway-secret-key-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bookstore_micro_gateway
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      FRONTEND_URL: http://localhost:15173
      SECURE_COOKIES: "False"
      CART_SERVICE_URL: http://cart-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      PAY_SERVICE_URL: http://pay-service:8000
      SHIP_SERVICE_URL: http://ship-service:8000
      AI_SERVICE_URL: http://ai-service:8000
      AUTH_SERVICE_URL: http://127.0.0.1:9
      CUSTOMER_SERVICE_URL: http://127.0.0.1:9
      BOOK_SERVICE_URL: http://product-service:8000
      COMMENT_SERVICE_URL: http://product-service:8000
      CATALOG_SERVICE_URL: http://127.0.0.1:9
      STAFF_SERVICE_URL: http://127.0.0.1:9
      MANAGER_SERVICE_URL: http://127.0.0.1:9
      ELECTRONICS_SERVICE_URL: http://product-service:8000
      FASHION_SERVICE_URL: http://product-service:8000
      TOY_SERVICE_URL: http://product-service:8000
      GROCERY_SERVICE_URL: http://product-service:8000
      FURNITURE_SERVICE_URL: http://product-service:8000
      BEAUTY_SERVICE_URL: http://product-service:8000
      SPORTS_SERVICE_URL: http://product-service:8000
      PET_SERVICE_URL: http://product-service:8000
      STATIONERY_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      pay-service:
        condition: service_healthy
      ship-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  product-service:
    build: ./product-service
    restart: unless-stopped
    ports:
      - "18002:8000"
    environment:
      SECRET_KEY: bookstore-product-secret-2024
      DEBUG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ecommerce_micro_product
      DB_USER: bookstore_admin
      DB_PASSWORD: 123456
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 6

  frontend:
    build: ./Frontend
    restart: unless-stopped
    ports:
      - "15173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - bookstore-network

volumes:
  postgres_data:
  neo4j_data:

networks:
  bookstore-network:
    driver: bridge
