        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Product Services (9 new product-type microservices)
  # ============================================================
  electronics-service:
    build: ./electronics-service
    restart: unless-stopped
    ports:
      - "18012:8000"
    environment:
      - SECRET_KEY=bookstore-electronics-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_electronics
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  fashion-service:
    build: ./fashion-service
    restart: unless-stopped
    ports:
      - "18013:8000"
    environment:
      - SECRET_KEY=bookstore-fashion-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_fashion
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  toy-service-v2:
