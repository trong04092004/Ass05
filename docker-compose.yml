    restart: unless-stopped
    ports:
      - "18014:8000"
    environment:
      - SECRET_KEY=bookstore-toy-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_toy
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
