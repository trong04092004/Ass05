      - DB_PORT=5432
      - DB_NAME=bookstore_micro_cart
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - BOOK_SERVICE_URL=http://book-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
