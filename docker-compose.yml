    environment:
      - SECRET_KEY=bookstore-ship-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_shipping
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      # [ASS6] SHIPPING_PROVIDER_URL=https://shipping-provider.com/api
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Comment / Rating Service
  # Port: 18007 | DB: bookstore_micro_rating
  # ============================================================
  comment-service:
    build: ./comment-service
    restart: unless-stopped
    ports:
      - "18007:8000"
    environment:
      - SECRET_KEY=bookstore-comment-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_rating
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - BOOK_SERVICE_URL=http://book-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Catalog Service (Category, Author, Publisher)
  # Port: 18008 | DB: bookstore_micro_catalog
  # ============================================================
  catalog-service:
    build: ./catalog-service
    restart: unless-stopped
    ports:
      - "18008:8000"
    environment:
      - SECRET_KEY=bookstore-catalog-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_catalog
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Staff Service (Staff Account Management)
  # Port: 18011 | DB: bookstore_micro_staff
  # ============================================================
  staff-service:
    build: ./staff-service
    restart: unless-stopped
