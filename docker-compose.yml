services:
  postgres:
    image: postgres:15-alpine
    container_name: bookstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookstore_admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - bookstore-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bookstore_admin -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
  api-gateway:
    build: ./api_gateway
    container_name: bookstore_api_gateway
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      - SECRET_KEY=bookstore-gateway-secret-key-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_gateway
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      # Service URLs (internal Docker network)
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      - COMMENT_SERVICE_URL=http://comment-service:8000
      - CATALOG_SERVICE_URL=http://catalog-service:8000
      - STAFF_SERVICE_URL=http://staff-service:8000
      - MANAGER_SERVICE_URL=http://manager-service:8000
      - ELECTRONICS_SERVICE_URL=http://electronics-service:8000
      - FASHION_SERVICE_URL=http://fashion-service:8000
      - TOY_SERVICE_URL=http://toy-service:8000
      - GROCERY_SERVICE_URL=http://grocery-service:8000
      - FURNITURE_SERVICE_URL=http://furniture-service:8000
      - BEAUTY_SERVICE_URL=http://beauty-service:8000
      - SPORTS_SERVICE_URL=http://sports-service:8000
      - PET_SERVICE_URL=http://pet-service:8000
      - STATIONERY_SERVICE_URL=http://stationery-service:8000
      - FRONTEND_URL=http://localhost:15173
      - AUTH_SERVICE_URL=http://auth-service:8000
    volumes:
      - ./api_gateway/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      customer-service:
        condition: service_started
      auth-service:
        condition: service_started
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      comment-service:
        condition: service_started
      catalog-service:
        condition: service_started
      staff-service:
        condition: service_started
      manager-service:
        condition: service_started
      electronics-service:
        condition: service_started
      fashion-service:
        condition: service_started
      toy-service:
        condition: service_started
      grocery-service:
        condition: service_started
      furniture-service:
        condition: service_started
      beauty-service:
        condition: service_started
      sports-service:
        condition: service_started
      pet-service:
        condition: service_started
      stationery-service:
        condition: service_started
    networks:
      - bookstore-network

  frontend:
    build: ./Frontend
    container_name: bookstore_frontend
    restart: unless-stopped
    ports:
      - "15173:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - bookstore-network

  # ============================================================
  # Auth Service (Centralized Authentication + JWT)
  # Port: 18021 | DB: bookstore_micro_customer (shared identity store)
  # ============================================================
  auth-service:
    build: ./auth-service
    container_name: bookstore_auth_svc
    restart: unless-stopped
    ports:
      - "18021:8000"
    environment:
      - SECRET_KEY=bookstore-auth-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_customer
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - CART_SERVICE_URL=http://cart-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started
    networks:
      - bookstore-network

  # ============================================================
  # Customer Service (Profile + Customer Data)
  # Port: 18001 | DB: bookstore_micro_customer
  # ============================================================
  customer-service:
    build: ./customer-service
    container_name: bookstore_customer_svc
    restart: unless-stopped
    ports:
      - "18001:8000"
    environment:
      - SECRET_KEY=bookstore-customer-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_customer
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - CART_SERVICE_URL=http://cart-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Book Service (Book Catalog CRUD)
  # Port: 18002 | DB: bookstore_micro_book
  # ============================================================
  book-service:
    build: ./book-service
    container_name: bookstore_book_svc
    restart: unless-stopped
    ports:
      - "18002:8000"
    environment:
      - SECRET_KEY=bookstore-book-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_book
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Cart Service (Shopping Cart)
  # Port: 18003 | DB: bookstore_micro_cart
  # ============================================================
  cart-service:
    build: ./cart-service
    container_name: bookstore_cart_svc
    restart: unless-stopped
    ports:
      - "18003:8000"
    environment:
      - SECRET_KEY=bookstore-cart-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_cart
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - BOOK_SERVICE_URL=http://book-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Order Service (Order Orchestrator)
  # Port: 18004 | DB: bookstore_micro_order
  # ============================================================
  order-service:
    build: ./order-service
    container_name: bookstore_order_svc
    restart: unless-stopped
    ports:
      - "18004:8000"
    environment:
      - SECRET_KEY=bookstore-order-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_order
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
      - CART_SERVICE_URL=http://cart-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - ELECTRONICS_SERVICE_URL=http://electronics-service:8000
      - FASHION_SERVICE_URL=http://fashion-service:8000
      - TOY_SERVICE_URL=http://toy-service:8000
      - GROCERY_SERVICE_URL=http://grocery-service:8000
      - FURNITURE_SERVICE_URL=http://furniture-service:8000
      - BEAUTY_SERVICE_URL=http://beauty-service:8000
      - SPORTS_SERVICE_URL=http://sports-service:8000
      - PET_SERVICE_URL=http://pet-service:8000
      - STATIONERY_SERVICE_URL=http://stationery-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      # [ASS6] SAGA_COORDINATOR_URL=http://saga-coordinator:8000
      # [ASS6] EVENT_BUS_URL=amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookstore-network

  # ============================================================
  # Payment Service
