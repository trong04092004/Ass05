    restart: unless-stopped
    ports:
      - "18015:8000"
    environment:
      - SECRET_KEY=bookstore-grocery-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_grocery
      - DB_USER=bookstore_admin
      - DB_PASSWORD=123456
    depends_on:
