      - bookstore-network

  beauty-service:
    build: ./beauty-service
    restart: unless-stopped
    ports:
      - "18017:8000"
    environment:
      - SECRET_KEY=bookstore-beauty-secret-2024
      - DEBUG=True
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookstore_micro_beauty
      - DB_USER=bookstore_admin
