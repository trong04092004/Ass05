{% extends "base.html" %}
{% block title %}Register - BookStore{% endblock %}
{% block content %}

<div class="auth-wrapper">

    <div class="auth-container">

        <div class="auth-left">
            <h2>Create Account</h2>
            <p>Join BookStore and discover amazing books everyday.</p>
            <div class="auth-icon">📚</div>
        </div>

        <div class="auth-right">

            <h3>Register</h3>

            {% if error %}
            <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="input-box">
                    <span>👤</span>
                    <input type="text" name="name" placeholder="Your full name" required>
                </div>

                <div class="input-box">
                    <span>📧</span>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-box">
                    <span>🔒</span>
                    <input type="password" name="password" placeholder="Minimum 6 characters" minlength="6" required>
                </div>

                <button class="btn-auth" type="submit">
                    Create Account
                </button>

            </form>

            <p class="switch-auth">
                Already have account?
                <a href="{% url 'login_page' %}">Login</a>
            </p>

        </div>

    </div>

</div>

<style>
.auth-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.auth-container {
    display: flex;
    width: 850px;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
}

.auth-left {
    flex: 1;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
}

.auth-left h2 {
    font-size: 30px;
    margin-bottom: 10px;
}

.auth-left p {
    font-size: 14px;
    opacity: .9;
}

.auth-icon {
    font-size: 70px;
    margin-top: 20px;
}

.auth-right {
    flex: 1;
    padding: 40px;
}

.auth-right h3 {
    margin-bottom: 25px;
}

.input-box {
    display: flex;
    align-items: center;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 15px;
}

.input-box span {
    margin-right: 8px;
}

.input-box input {
    border: none;
    outline: none;
    flex: 1;
    font-size: 14px;
}

.btn-auth {
    width: 100%;
    padding: 12px;
    background: #667eea;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: .3s;
}

.btn-auth:hover {
    background: #5563d1;
}

.switch-auth {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
}

.switch-auth a {
    color: #667eea;
    font-weight: 600;
    text-decoration: none;
}

.alert-error {
    background: #ffeded;
    color: #c0392b;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}
</style>

{% endblock %}
